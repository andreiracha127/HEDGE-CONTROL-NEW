server {
    listen ${PORT};
    server_name _;
    root /usr/share/nginx/html;
    index 200.html;

    # Security headers
    # CSP — report-only ramp (1-2 sprints to collect violations + tune)
    # After clean reports, flip header name to Content-Security-Policy in a
    # follow-up PR. See docs/governance.md AUTHORIZATION MATRIX context +
    # memory project_cluster_3_platform_decisions for the bindado shape.
    #
    # TODO(post-cluster-3): swap ${CLERK_FAPI_HOST} from clerk.<random>.lcl.dev
    # (dev) to clerk.<custom-domain> (prod custom domain).
    add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self' 'unsafe-inline' https://${CLERK_FAPI_HOST} https://challenges.cloudflare.com; connect-src 'self' ${VITE_API_BASE_URL} ${VITE_WS_BASE_URL} https://${CLERK_FAPI_HOST} https://clerk-telemetry.com; img-src 'self' data: https://img.clerk.com; frame-src https://challenges.cloudflare.com; worker-src 'self' blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com https://fonts.googleapis.com; form-action 'self'; frame-ancestors 'none'; base-uri 'self'; object-src 'none'; upgrade-insecure-requests; report-to csp-endpoint;" always;
    add_header Report-To '{"group":"csp-endpoint","max_age":10886400,"endpoints":[{"url":"${VITE_API_BASE_URL}/csp/report"}]}' always;
    add_header X-Frame-Options "DENY" always;  # was SAMEORIGIN; tightened to DENY per D-3.3
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — all routes serve 200.html
    location / {
        try_files $uri $uri/ /200.html;
    }

    # Health check
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
