services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hedgecontrol
      POSTGRES_USER: hc
      POSTGRES_PASSWORD: hc
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hc -d hedgecontrol"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://hc:hc@db:5432/hedgecontrol
      CORS_ALLOW_ORIGINS: "http://localhost:8080,http://localhost:5173"
      SCHEDULER_DISABLED: "true"
      # APP_ENV=development exempts the audit-signing-key boot validator
      # (defense-in-depth Layer 2) for local docker-compose convenience.
      # Production/staging deployments MUST override APP_ENV to "production"
      # or "staging" AND supply a real AUDIT_SIGNING_KEY via secret store.
      APP_ENV: "development"
      # Dev-only signing key — clearly non-production. The runtime guard
      # inside AuditTrailService.record (Layer 1) still fails-closed if a
      # production deployment forgets to override this.
      AUDIT_SIGNING_KEY: "dev-only-do-not-use-in-prod-replace-me"
    ports:
      - "8000:8000"

  frontend-svelte:
    build:
      context: frontend-svelte
      dockerfile: Dockerfile
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:8080"
    depends_on:
      - backend

volumes:
  pgdata:
