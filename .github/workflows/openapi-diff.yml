name: OpenAPI Contract Diff

on:
  pull_request:
    branches:
      - main

jobs:
  openapi_diff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps
        run: pip install -r backend/requirements.txt

      - name: Install oasdiff
        run: |
          curl -fsSL https://raw.githubusercontent.com/oasdiff/oasdiff/main/install.sh | sudo sh
          oasdiff --version

      - name: Export OpenAPI (PR)
        env:
          DATABASE_URL: "sqlite+pysqlite:///:memory:"
          SCHEDULER_DISABLED: "1"
        run: python backend/scripts/export_openapi.py > /tmp/openapi_pr.json

      - name: Export OpenAPI (main)
        env:
          DATABASE_URL: "sqlite+pysqlite:///:memory:"
          SCHEDULER_DISABLED: "1"
        run: |
          # Overlay main's backend/ (incl. its requirements.txt) on the worktree.
          git checkout origin/main -- backend/
          # Reinstall against main's pins so the exported spec reflects what
          # origin/main actually produces — not the PR's library versions.
          pip install --force-reinstall -r backend/requirements.txt
          python backend/scripts/export_openapi.py > /tmp/openapi_main.json
          # Restore PR worktree (deps left at main's versions; harmless since
          # no further Python steps run after this).
          git checkout HEAD -- backend/

      - name: Compare OpenAPI (breaking changes)
        run: oasdiff breaking /tmp/openapi_main.json /tmp/openapi_pr.json
