name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  frontend-check:
    name: "Frontend: svelte-check + TypeScript"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-svelte
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend-svelte/package-lock.json

      - run: npm ci
      - run: npm run check

  frontend-test:
    name: "Frontend: Vitest"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-svelte
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend-svelte/package-lock.json

      - run: npm ci
      - run: npm run test

  frontend-build:
    name: "Frontend: Static Build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-svelte
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend-svelte/package-lock.json

      - run: npm ci
      - run: npm run build
      - name: Check ECharts bundle size budget
        run: bash scripts/check-bundle-size.sh

  backend-test:
    name: "Backend: pytest"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      SCHEDULER_DISABLED: "1"
      DATABASE_URL: "sqlite+pysqlite:///:memory:"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - run: pip install -r requirements.txt
      - run: pip install pytest pytest-cov httpx
      - run: pytest -v

  e2e-playwright:
    name: "E2E: Playwright (docker-compose)"
    runs-on: ubuntu-latest
    needs: [frontend-build, backend-test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend-svelte/package-lock.json

      - name: Install Playwright browsers
        working-directory: frontend-svelte
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Start docker-compose stack
        run: |
          docker compose up -d db backend
          # Wait for backend to be healthy
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1 || curl -sf http://localhost:8000/docs > /dev/null 2>&1; then
              echo "Backend is ready"
              break
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 2
          done

      - name: Check schema drift
        working-directory: frontend-svelte
        run: bash scripts/check-schema-drift.sh
        env:
          API_BASE_URL: http://localhost:8000

      - name: Build and serve frontend
        working-directory: frontend-svelte
        run: |
          npm run build
          npx serve build -l 5173 --no-port-switching -c ../serve.json &
          sleep 2
        env:
          VITE_API_BASE_URL: http://localhost:8000
          # J-A6-10 opt-in: the E2E build is a production-mode bundle but
          # the Playwright helpers use the dev-token paste login (see
          # frontend-svelte/e2e/helpers.ts). This is the documented
          # "explicit-opt-in" branch — the test harness signals that it
          # understands the manual-token path is dev-only and is using
          # it against a sandboxed backend on purpose.
          VITE_ALLOW_MANUAL_TOKEN_LOGIN: '1'

      - name: Run Playwright tests
        working-directory: frontend-svelte
        run: npx playwright test
        env:
          BASE_URL: http://localhost:5173

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: frontend-svelte/playwright-report/
          retention-days: 7

      - name: Teardown docker-compose
        if: always()
        run: docker compose down -v
